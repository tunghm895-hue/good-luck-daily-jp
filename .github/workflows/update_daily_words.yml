name: Tao tu tieng Nhat moi moi ngay

on:
  workflow_dispatch:
  schedule:
    # 05:17, 13:17, 21:17 theo giờ Nhật.
    - cron: "17 5,13,21 * * *"
      timezone: "Asia/Tokyo"

permissions:
  contents: write

concurrency:
  group: daily-japanese-words
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Tai ma nguon
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cai Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cai thu vien
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tao danh sach tu moi
        run: python scripts/build_today_words.py

      - name: Luu today_words.json va lich su 14 ngay vao repository
        run: |
          if [ -z "$(git status --porcelain -- public/today_words.json data/recent_suggested_terms.json)" ]; then
            echo "Khong co thay doi."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/today_words.json data/recent_suggested_terms.json
          git commit -m "chore: update daily Japanese terms and 14-day history"

          # Nếu main có commit mới trong lúc workflow đang chạy, rebase commit
          # JSON lên main mới nhất rồi thử push lại. "theirs" ưu tiên file JSON
          # vừa do workflow tạo khi chính file đó bị thay đổi đồng thời.
          for attempt in 1 2 3; do
            if git pull --rebase -X theirs origin main && git push origin HEAD:main; then
              echo "Da luu today_words.json va lich su 14 ngay vao main."
              exit 0
            fi

            echo "Lan day thu $attempt chua push duoc; thu dong bo lai..."
            sleep $((attempt * 2))
          done

          echo "Khong the push sau 3 lan thu."
          exit 1
