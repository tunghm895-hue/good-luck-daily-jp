name: Tao tu tieng Nhat moi moi ngay

on:
  workflow_dispatch:

  schedule:
    - cron: "17 5 * * *"
      timezone: "Asia/Tokyo"

permissions:
  contents: write

concurrency:
  group: daily-japanese-words
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Tai ma nguon
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cai Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cai thu vien
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tao danh sach tu moi
        run: python scripts/build_today_words.py

      - name: Luu today_words.json vao repository
        run: |
          if [ -z "$(git status --porcelain -- public/today_words.json)" ]; then
            echo "Khong co thay doi."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/today_words.json
          git commit -m "chore: update daily Japanese terms"
          git push
